<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>BEAM.v3 — P2P File Transfer</title>
    <link rel="icon" type="image/png" href="https://ik.imagekit.io/f8dc2modt/undraw_male-athlete-avatar_dabn.png?updatedAt=1771493946260">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0a; --surface: #111; --surface2: #1a1a1a;
            --fg: #e0e0e0; --fg2: #888; --fg3: #555;
            --border: #2a2a2a; --border2: #333;
            --accent: #fff; --accent-dim: rgba(255,255,255,0.1);
            --success: #4ade80; --error: #f87171; --warn: #fbbf24;
            --radius: 8px; --radius-lg: 12px;
            --shadow: 0 4px 24px rgba(0,0,0,0.5);
            --font: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
        }
        [data-theme="light"] {
            --bg: #f5f5f5; --surface: #fff; --surface2: #f0f0f0;
            --fg: #1a1a1a; --fg2: #666; --fg3: #999;
            --border: #ddd; --border2: #ccc;
            --accent: #000; --accent-dim: rgba(0,0,0,0.05);
            --shadow: 0 4px 24px rgba(0,0,0,0.1);
        }
        [data-theme="light"] .card { background: rgba(255,255,255,0.85); }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            background: #000; color: var(--fg);
            font-family: var(--font); height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            margin: 0; padding: 0; position: fixed;
            -webkit-user-select: none; user-select: none;
            touch-action: manipulation; overflow: hidden;
        }
        #shader-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
        .toast {
            background: var(--surface); border: 1px solid var(--border);
            padding: 12px 20px; border-radius: var(--radius);
            font-size: 11px; color: var(--fg); animation: toastIn 0.3s ease;
            box-shadow: var(--shadow); max-width: 300px;
        }
        .toast.success { border-left: 3px solid var(--success); }
        .toast.error { border-left: 3px solid var(--error); }
        .toast.info { border-left: 3px solid var(--warn); }
        @keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateX(40px); } }

        .card {
            background: rgba(17,17,17,0.85); border: 1px solid var(--border);
            border-radius: var(--radius-lg); padding: 32px;
            width: 100%; max-width: 400px; position: relative; z-index: 1;
            box-shadow: var(--shadow); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }
        .card.state-sharing .header, .card.state-sharing .status-bar,
        .card.state-sharing .drop-zone, .card.state-sharing .file-list,
        .card.state-sharing .progress-section, .card.state-sharing .actions,
        .card.state-sharing .history-section { display: none; }
        .card.state-sharing .link-section {
            display: flex; flex-direction: column; align-items: center;
            margin-bottom: 0; text-align: center;
        }
        .card.state-sharing .link-section::before {
            content: 'SCAN QR OR SHARE LINK';
            display: block; font-size: 10px; color: var(--fg3);
            letter-spacing: 1px; margin-bottom: 16px;
        }
        .card.state-transfer .link-section, .card.state-transfer .actions { display: none !important; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
        .logo { font-weight: 900; letter-spacing: -1.5px; font-size: 22px; color: var(--fg); }
        .logo span { color: var(--fg3); font-weight: 400; font-size: 12px; margin-left: 6px; }
        .header-actions { display: flex; gap: 8px; align-items: center; }
        .icon-btn {
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--fg2); width: 32px; height: 32px;
            border-radius: var(--radius); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; transition: all 0.15s;
        }
        .icon-btn:hover { color: var(--fg); border-color: var(--border2); }

        .status-bar {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 14px; background: var(--surface2);
            border: 1px solid var(--border); border-radius: var(--radius);
            margin-bottom: 20px; font-size: 10px; color: var(--fg2);
        }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--error); flex-shrink: 0; }
        .status-dot.online { background: var(--success); animation: pulse 2s infinite; }
        .status-dot.connecting { background: var(--warn); animation: pulse 0.8s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .status-text { flex: 1; }
        .signal-bars { display: flex; gap: 2px; align-items: flex-end; }
        .signal-bar { width: 3px; background: var(--fg3); border-radius: 1px; }
        .signal-bar.active { background: var(--success); }

        .drop-zone {
            border: 2px dashed var(--border2); border-radius: var(--radius-lg);
            padding: 40px 20px; text-align: center; cursor: pointer;
            transition: all 0.2s; position: relative; overflow: hidden;
            margin-bottom: 16px;
        }
        .drop-zone:hover, .drop-zone.dragover { border-color: var(--fg); background: var(--accent-dim); }
        .drop-zone.dragover { transform: scale(1.01); }
        .drop-zone-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.5; }
        .drop-zone-text { font-size: 11px; color: var(--fg2); }
        .drop-zone-text b { color: var(--fg); }
        .drop-zone input[type="file"] { display: none; }

        .file-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
        .file-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; background: var(--surface2);
            border: 1px solid var(--border); border-radius: var(--radius);
            font-size: 11px; animation: slideIn 0.2s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } }
        .file-icon { font-size: 18px; flex-shrink: 0; }
        .file-info { flex: 1; min-width: 0; }
        .file-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-meta { color: var(--fg3); font-size: 9px; margin-top: 2px; }
        .file-preview { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
        .file-remove { background: none; border: none; color: var(--fg3); cursor: pointer; font-size: 14px; padding: 4px; }
        .file-remove:hover { color: var(--error); }

        .link-section { margin-bottom: 16px; display: none; }
        .qr-wrap {
            background: #fff; padding: 16px; border-radius: var(--radius);
            display: flex; justify-content: center; align-items: center;
            margin: 0 auto 12px; width: fit-content;
        }
        .qr-wrap img { width: 160px !important; height: 160px !important; }
        .link-box {
            background: var(--surface2); border: 1px solid var(--border);
            padding: 10px 14px; border-radius: var(--radius);
            font-size: 10px; color: var(--fg2); word-break: break-all;
            cursor: pointer; transition: all 0.15s; text-align: center;
        }
        .link-box:hover { border-color: var(--fg); color: var(--fg); }

        .progress-section { display: none; margin-bottom: 16px; }
        .progress-header { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 8px; }
        .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
        .progress-fill {
            height: 100%; background: var(--fg); width: 0%;
            border-radius: 2px; transition: width 0.3s;
            box-shadow: 0 0 8px rgba(255,255,255,0.3);
        }
        [data-theme="light"] .progress-fill { box-shadow: 0 0 8px rgba(0,0,0,0.2); }
        .progress-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        .stat { text-align: center; }
        .stat-label { font-size: 8px; color: var(--fg3); text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 12px; font-weight: 700; margin-top: 2px; }

        .actions { display: flex; gap: 8px; }
        .uiverse {
            --duration: 7s; --easing: linear;
            --c-color-1: rgba(255, 163, 26, 0.7); --c-color-2: #1a23ff;
            --c-color-3: #e21bda; --c-color-4: rgba(255, 232, 26, 0.7);
            --c-shadow: rgba(255, 223, 87, 0.5);
            --c-shadow-inset-top: rgba(255, 223, 52, 0.9);
            --c-shadow-inset-bottom: rgba(255, 250, 215, 0.8);
            --c-radial-inner: #ffd215; --c-radial-outer: #fff172; --c-color: #fff;
            -webkit-tap-highlight-color: transparent; -webkit-appearance: none;
            outline: none; position: relative; cursor: pointer; border: none;
            display: table; border-radius: 24px; padding: 0; margin: 0 auto;
            text-align: center; font-weight: 600; font-size: 14px;
            font-family: var(--font); letter-spacing: 0.02em; line-height: 1.5;
            color: var(--c-color);
            background: radial-gradient(circle, var(--c-radial-inner), var(--c-radial-outer) 80%);
            box-shadow: 0 0 14px var(--c-shadow);
        }
        .uiverse:before {
            content: ""; pointer-events: none; position: absolute; z-index: 3;
            left: 0; top: 0; right: 0; bottom: 0; border-radius: 24px;
            box-shadow: inset 0 3px 12px var(--c-shadow-inset-top), inset 0 -3px 4px var(--c-shadow-inset-bottom);
        }
        .uiverse .wrapper { -webkit-mask-image: -webkit-radial-gradient(white, black); overflow: hidden; border-radius: 24px; min-width: 132px; padding: 12px 0; }
        .uiverse .wrapper span { display: inline-block; position: relative; z-index: 1; }
        .uiverse:hover { --duration: 1400ms; }
        .uiverse .wrapper .circle {
            position: absolute; left: 0; top: 0; width: 40px; height: 40px;
            border-radius: 50%; filter: blur(var(--blur, 8px));
            background: var(--background, transparent);
            transform: translate(var(--x, 0), var(--y, 0)) translateZ(0);
            animation: var(--animation, none) var(--duration) var(--easing) infinite;
        }
        .uiverse .wrapper .circle.circle-1, .uiverse .wrapper .circle.circle-9, .uiverse .wrapper .circle.circle-10 { --background: var(--c-color-4); }
        .uiverse .wrapper .circle.circle-3, .uiverse .wrapper .circle.circle-4 { --background: var(--c-color-2); --blur: 14px; }
        .uiverse .wrapper .circle.circle-5, .uiverse .wrapper .circle.circle-6 { --background: var(--c-color-3); --blur: 16px; }
        .uiverse .wrapper .circle.circle-2, .uiverse .wrapper .circle.circle-7, .uiverse .wrapper .circle.circle-8, .uiverse .wrapper .circle.circle-11, .uiverse .wrapper .circle.circle-12 { --background: var(--c-color-1); --blur: 12px; }
        .uiverse .wrapper .circle.circle-1 { --x: 0; --y: -40px; --animation: circle-1; }
        .uiverse .wrapper .circle.circle-2 { --x: 92px; --y: 8px; --animation: circle-2; }
        .uiverse .wrapper .circle.circle-3 { --x: -12px; --y: -12px; --animation: circle-3; }
        .uiverse .wrapper .circle.circle-4 { --x: 80px; --y: -12px; --animation: circle-4; }
        .uiverse .wrapper .circle.circle-5 { --x: 12px; --y: -4px; --animation: circle-5; }
        .uiverse .wrapper .circle.circle-6 { --x: 56px; --y: 16px; --animation: circle-6; }
        .uiverse .wrapper .circle.circle-7 { --x: 8px; --y: 28px; --animation: circle-7; }
        .uiverse .wrapper .circle.circle-8 { --x: 28px; --y: -4px; --animation: circle-8; }
        .uiverse .wrapper .circle.circle-9 { --x: 20px; --y: -12px; --animation: circle-9; }
        .uiverse .wrapper .circle.circle-10 { --x: 64px; --y: 16px; --animation: circle-10; }
        .uiverse .wrapper .circle.circle-11 { --x: 4px; --y: 4px; --animation: circle-11; }
        .uiverse .wrapper .circle.circle-12 { --blur: 14px; --x: 52px; --y: 4px; --animation: circle-12; }
        @keyframes circle-1 { 33% { transform: translate(0px, 16px) translateZ(0); } 66% { transform: translate(12px, 64px) translateZ(0); } }
        @keyframes circle-2 { 33% { transform: translate(80px, -10px) translateZ(0); } 66% { transform: translate(72px, -48px) translateZ(0); } }
        @keyframes circle-3 { 33% { transform: translate(20px, 12px) translateZ(0); } 66% { transform: translate(12px, 4px) translateZ(0); } }
        @keyframes circle-4 { 33% { transform: translate(76px, -12px) translateZ(0); } 66% { transform: translate(112px, -8px) translateZ(0); } }
        @keyframes circle-5 { 33% { transform: translate(84px, 28px) translateZ(0); } 66% { transform: translate(40px, -32px) translateZ(0); } }
        @keyframes circle-6 { 33% { transform: translate(28px, -16px) translateZ(0); } 66% { transform: translate(76px, -56px) translateZ(0); } }
        @keyframes circle-7 { 33% { transform: translate(8px, 28px) translateZ(0); } 66% { transform: translate(20px, -60px) translateZ(0); } }
        @keyframes circle-8 { 33% { transform: translate(32px, -4px) translateZ(0); } 66% { transform: translate(56px, -20px) translateZ(0); } }
        @keyframes circle-9 { 33% { transform: translate(20px, -12px) translateZ(0); } 66% { transform: translate(80px, -8px) translateZ(0); } }
        @keyframes circle-10 { 33% { transform: translate(68px, 20px) translateZ(0); } 66% { transform: translate(100px, 28px) translateZ(0); } }
        @keyframes circle-11 { 33% { transform: translate(4px, 4px) translateZ(0); } 66% { transform: translate(68px, 20px) translateZ(0); } }
        @keyframes circle-12 { 33% { transform: translate(56px, 0px) translateZ(0); } 66% { transform: translate(60px, -32px) translateZ(0); } }
        .uiverse:disabled { opacity: 0.3; cursor: not-allowed; }
        .uiverse:disabled .wrapper .circle { animation-play-state: paused; }

        .history-section { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px; display: none; }
        .history-title { font-size: 9px; color: var(--fg3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .history-list { display: flex; flex-direction: column; gap: 4px; }
        .history-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 10px; font-size: 9px; color: var(--fg2);
            background: var(--surface2); border-radius: 4px;
        }
        .history-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-size { color: var(--fg3); margin-left: 8px; }
        .history-status { margin-left: 8px; }
        .history-status.done { color: var(--success); }

        .debug-section { margin-top: 12px; display: none; }
        .debug-log {
            background: var(--bg); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 8px 10px;
            font-size: 9px; color: var(--fg3); max-height: 100px;
            overflow-y: auto; line-height: 1.6;
        }
        .debug-log::-webkit-scrollbar { width: 3px; }
        .debug-log::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
        .debug-line.err { color: var(--error); }
        .debug-line.ok { color: var(--success); }
        .debug-line.warn { color: var(--warn); }

        @media (max-width: 560px) {
            .card { padding: 20px; }
            .drop-zone { padding: 30px 16px; }
            .progress-stats { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<canvas id="shader-canvas"></canvas>
<div id="toast-container"></div>

<div class="card">
    <div class="header">
        <div class="logo">BEAM<span>v3</span></div>
        <div class="header-actions">
            <button class="icon-btn" onclick="app.toggleDebug()" title="Debug log">&#9881;</button>
            <button class="icon-btn" onclick="app.toggleTheme()" title="Toggle theme">&#9787;</button>
            <button class="icon-btn" onclick="app.toggleHistory()" title="History">&#8862;</button>
        </div>
    </div>

    <div class="status-bar">
        <div class="status-dot" id="status-dot"></div>
        <div class="status-text" id="status-text">INITIALIZING...</div>
        <div class="signal-bars" id="signal-bars">
            <div class="signal-bar" style="height:4px"></div>
            <div class="signal-bar" style="height:7px"></div>
            <div class="signal-bar" style="height:10px"></div>
            <div class="signal-bar" style="height:13px"></div>
        </div>
    </div>

    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <input type="file" id="file-input" multiple>
        <div class="drop-zone-icon">&#8677;</div>
        <div class="drop-zone-text"><b>CLICK OR DROP FILES</b><br>Multiple files supported</div>
    </div>

    <div class="file-list" id="file-list"></div>

    <div class="link-section" id="link-section">
        <div class="qr-wrap" id="qrcode"></div>
        <div class="link-box" id="link-box" onclick="app.copyLink()">GENERATING LINK...</div>
    </div>

    <div class="progress-section" id="progress-section">
        <div class="progress-header">
            <span id="progress-label">TRANSFERRING...</span>
            <span id="progress-pct">0%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="progress-stats">
            <div class="stat"><div class="stat-label">Speed</div><div class="stat-value" id="stat-speed">--</div></div>
            <div class="stat"><div class="stat-label">ETA</div><div class="stat-value" id="stat-eta">--</div></div>
            <div class="stat"><div class="stat-label">Size</div><div class="stat-value" id="stat-size">--</div></div>
        </div>
    </div>

    <div class="actions" id="actions">
        <button class="uiverse" id="action-btn" onclick="app.selectFiles()">
            <div class="wrapper">
                <span>SELECT FILES</span>
                <div class="circle circle-12"></div><div class="circle circle-11"></div>
                <div class="circle circle-10"></div><div class="circle circle-9"></div>
                <div class="circle circle-8"></div><div class="circle circle-7"></div>
                <div class="circle circle-6"></div><div class="circle circle-5"></div>
                <div class="circle circle-4"></div><div class="circle circle-3"></div>
                <div class="circle circle-2"></div><div class="circle circle-1"></div>
            </div>
        </button>
    </div>

    <div class="history-section" id="history-section">
        <div class="history-title">Transfer History</div>
        <div class="history-list" id="history-list"></div>
    </div>

    <div class="debug-section" id="debug-section">
        <div class="debug-log" id="debug-log"></div>
    </div>
</div>

<script>
class BeamApp {
    constructor() {
        this.peer = null;
        this.conn = null;
        this.files = [];
        this.history = [];
        this.isSender = false;
        this.isReceiver = false;
        this.connected = false;
        this.startTime = 0;
        this.totalBytes = 0;
        this.transferredBytes = 0;
        this.speedSamples = [];
        this.chunkSize = 64 * 1024;
        this.initTimeout = null;
        this.vanishOnReceive = true;
        this._encKey = null;
        this._encSalt = null;
        this._decKey = null;
        this.sessionKey = this.generateKey();

        this.serverConfigs = [
            {
                host: '0.peerjs.com', port: 443, path: '/', secure: true,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun2.l.google.com:19302' },
                        { urls: 'stun:stun.cloudflare.com:3478' },
                    ],
                    sdpSemantics: 'unified-plan'
                }
            },
            {
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun.cloudflare.com:3478' },
                        { urls: 'stun:openrelay.metered.ca:80' },
                    ],
                    sdpSemantics: 'unified-plan'
                }
            }
        ];

        this.init();
    }

    generateKey() {
        const b = crypto.getRandomValues(new Uint8Array(32));
        return Array.from(b).map(x => x.toString(16).padStart(2, '0')).join('');
    }

    log(msg, type = '') {
        const el = document.getElementById('debug-log');
        const line = document.createElement('div');
        line.className = 'debug-line' + (type ? ' ' + type : '');
        line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        el.appendChild(line);
        el.scrollTop = el.scrollHeight;
    }

    toggleDebug() {
        const s = document.getElementById('debug-section');
        s.style.display = s.style.display === 'none' ? 'block' : 'none';
    }

    init() {
        this.log('Starting BEAM v3...');
        this.setupDropZone();
        this.connectToServer(0);
    }

    connectToServer(idx) {
        if (this.peer) { try { this.peer.destroy(); } catch(e){} this.peer = null; }
        if (this.initTimeout) { clearTimeout(this.initTimeout); this.initTimeout = null; }

        if (idx >= this.serverConfigs.length) {
            this.setStatus('offline', 'SERVERS OFFLINE');
            this.toast('Cannot reach servers. Check internet.', 'error');
            this.updateAction('RETRY', false);
            document.getElementById('action-btn').onclick = () => {
                this.setStatus('connecting', 'RETRYING...');
                this.tryConnectWithTimeout(0);
            };
            return;
        }

        const cfg = this.serverConfigs[idx];
        this.setStatus('connecting', `CONNECTING [${idx + 1}/${this.serverConfigs.length}]...`);
        this.log(`Server ${idx + 1}: ${cfg.host || 'default'}`, 'warn');

        try {
            this.peer = cfg.host
                ? new Peer({ host: cfg.host, port: cfg.port, path: cfg.path, secure: cfg.secure, config: cfg.config, debug: 1 })
                : new Peer({ config: cfg.config, debug: 1 });
        } catch(e) {
            this.log(`Create failed: ${e.message}`, 'err');
            this.connectToServer(idx + 1);
            return;
        }

        this.initTimeout = setTimeout(() => {
            this.log('Server timeout', 'err');
            this.connectToServer(idx + 1);
        }, 10000);

        this.peer.on('open', (id) => {
            clearTimeout(this.initTimeout);
            this.initTimeout = null;
            this.log(`Connected! My ID: ${id}`, 'ok');
            this.setStatus('online', `NODE: ${id.substring(0, 8)}`);
            this.toast('Ready', 'success');

            // If receiver opened via ?p= link, connect now
            const targetId = new URLSearchParams(window.location.search).get('p');
            if (targetId) {
                this.log(`Auto-connecting to: ${targetId}`);
                this.setStatus('connecting', 'CONNECTING TO PEER...');
                this.connectToPeer(targetId);
            }
        });

        this.peer.on('connection', (c) => {
            this.log(`Incoming data connection: ${c.peer}`, 'ok');
            this.bindConnection(c);
        });

        this.peer.on('error', (err) => {
            this.log(`Peer error: ${err.type}`, 'err');
            if (['server-error', 'socket-error', 'socket-closed'].includes(err.type)) {
                clearTimeout(this.initTimeout);
                this.initTimeout = null;
                this.connectToServer(idx + 1);
            } else if (err.type === 'peer-unavailable') {
                this.toast('Peer not found or offline', 'error');
                this.setStatus('offline', 'PEER NOT FOUND');
            }
        });

        this.peer.on('disconnected', () => {
            this.log('Disconnected', 'warn');
            this.setStatus('connecting', 'RECONNECTING...');
            try { this.peer.reconnect(); } catch(e){}
        });
    }

    tryConnectWithTimeout(idx) {
        this.connectToServer(idx);
    }

    // ─── Connection ──────────────────────────────────────────────
    connectToPeer(peerId) {
        this.log(`Connecting to peer: ${peerId}`);
        const c = this.peer.connect(peerId, { reliable: true });
        this.bindConnection(c);
    }

    bindConnection(c) {
        this.conn = c;
        this.log(`Binding connection to ${c.peer}`);

        // Handle open
        const onOpen = () => {
            if (this.connected) return;
            this.connected = true;
            this.log('Data channel OPEN!', 'ok');
            this.setStatus('online', 'PEER CONNECTED');
            this.toast('Connected!', 'success');
            document.querySelector('.card').className = 'card state-transfer';
            if (this.isSender && this.files.length > 0) this.sendFileManifest();
        };

        // If already open, fire immediately
        if (c.open) {
            onOpen();
        } else {
            c.on('open', onOpen);
        }

        // Handle data
        c.on('data', (data) => this.onData(data));

        // Handle close
        c.on('close', () => {
            this.log('Connection closed');
            this.connected = false;
            this.toast('Peer disconnected', 'info');
            this.setStatus('online', 'DISCONNECTED');
        });

        // Handle error
        c.on('error', (err) => {
            this.log(`Connection error: ${err}`, 'err');
            this.toast('Connection error', 'error');
        });
    }

    // ─── Sender ──────────────────────────────────────────────────
    selectFiles() {
        document.getElementById('file-input').click();
    }

    handleFiles(fileList) {
        this.files = Array.from(fileList);
        if (!this.files.length) return;
        this.isSender = true;
        document.querySelector('.card').className = 'card state-sharing';
        this.setStatus('online', 'AWAITING RECEIVER');
        if (this.peer && this.peer.id) {
            const shareUrl = `${window.location.origin}${window.location.pathname}?p=${this.peer.id}`;
            document.getElementById('link-section').style.display = 'flex';
            document.getElementById('link-box').innerText = shareUrl;
            const qrEl = document.getElementById('qrcode');
            qrEl.innerHTML = '';
            new QRCode(qrEl, { text: shareUrl, width: 160, height: 160 });
            this.log(`Share link: ${shareUrl}`, 'ok');
        }
        if (this.connected && this.conn) this.sendFileManifest();
    }

    removeFile(i) {
        this.files.splice(i, 1);
        if (!this.files.length) { this.resetUI(); return; }
        this.handleFiles(this.files);
    }

    sendFileManifest() {
        this.log('Sending file manifest...');
        const manifest = this.files.map(f => ({ name: f.name, size: f.size, type: f.type }));
        try {
            this.conn.send({ type: 'manifest', files: manifest, key: this.sessionKey });
            this.updateAction('AWAITING RECEIVER...', true);
            this.log('Manifest sent', 'ok');
        } catch(e) {
            this.log(`Manifest send failed: ${e}`, 'err');
        }
    }

    async startSending() {
        this.startTime = Date.now();
        this.totalBytes = this.files.reduce((s, f) => s + f.size, 0);
        this.transferredBytes = 0;
        this.showProgress();
        this.log(`Sending ${this.files.length} files (${this.formatSize(this.totalBytes)})`);

        for (let i = 0; i < this.files.length; i++) {
            const file = this.files[i];
            try { this.conn.send({ type: 'file-start', name: file.name, size: file.size, index: i }); } catch(e) { this.log('Send error: '+e, 'err'); break; }
            this.log(`Sending file ${i + 1}: ${file.name}`);

            let offset = 0;
            while (offset < file.size) {
                while (this.conn.bufferedAmount > 1024 * 1024) await this.sleep(50);
                const end = Math.min(offset + this.chunkSize, file.size);
                const chunk = await file.slice(offset, end).arrayBuffer();
                const encrypted = await this.encryptChunk(chunk);
                try { this.conn.send({ type: 'chunk', data: encrypted, index: i }); } catch(e) { this.log('Chunk send error: '+e, 'err'); break; }
                offset += (end - offset);
                this.transferredBytes += (encrypted.byteLength || (end - offset));
                this.updateProgress();
                await this.sleep(0);
            }
            try { this.conn.send({ type: 'file-end', index: i }); } catch(e) { this.log('File-end error: '+e, 'err'); break; }
            this.log(`Done: ${file.name}`, 'ok');
        }
        try { this.conn.send({ type: 'done' }); } catch(e){}
        this.log('All files sent!', 'ok');
        this.onTransferDone();
    }

    // ─── Data Handler ────────────────────────────────────────────
    onData(data) {
        switch (data.type) {
            case 'manifest':
                this.onManifest(data);
                break;
            case 'ready':
                this.log('Receiver ready, starting send');
                this.startSending();
                break;
            case 'file-start':
                this.currentChunks = [];
                this.currentFileName = data.name;
                this.currentFileSize = data.size;
                this.log(`Receiving: ${data.name} (${this.formatSize(data.size)})`);
                break;
            case 'chunk':
                this.onChunk(data);
                break;
            case 'file-end':
                this.onFileEnd(data);
                break;
            case 'done':
                this.onTransferDone();
                break;
        }
    }

    onManifest(data) {
        this.log(`Manifest received: ${data.files.length} files`);
        this.sessionKey = data.key;
        this._decKey = null;
        this.totalSize = data.files.reduce((s, f) => s + f.size, 0);
        this.receivedBytes = 0;
        this.currentChunks = [];
        this.fileResults = [];
        this.isReceiver = true;

        // Show incoming file list
        const listEl = document.getElementById('file-list');
        listEl.innerHTML = '';
        data.files.forEach(f => {
            const item = document.createElement('div');
            item.className = 'file-item';
            item.innerHTML = `
                <div class="file-icon">${this.getFileEmoji(f.name)}</div>
                <div class="file-info">
                    <div class="file-name">${this.escapeHtml(f.name)}</div>
                    <div class="file-meta">${this.formatSize(f.size)} &middot; ${f.type || 'unknown'}</div>
                </div>
            `;
            listEl.appendChild(item);
        });

        document.getElementById('drop-zone').style.display = 'none';
        document.querySelector('.card').className = 'card state-transfer';
        this.showProgress();
        this.startTime = Date.now();

        // Tell sender we're ready
        this.conn.send({ type: 'ready' });
        this.log('Sent ready signal', 'ok');
    }

    async onChunk(data) {
        try {
            const chunk = await this.decryptChunk(data.data);
            this.currentChunks.push(chunk);
        } catch(e) {
            this.log('Decryption failed', 'err');
            this.currentChunks.push(data.data);
        }
        this.receivedBytes += (data.data.byteLength || 0);
        this.updateProgress();
    }

    onFileEnd(data) {
        const blob = new Blob(this.currentChunks);
        this.fileResults = this.fileResults || [];
        this.fileResults.push({ name: this.currentFileName, blob });
        this.addToHistory(this.currentFileName, this.currentFileSize, 'done');
        this.log(`Received: ${this.currentFileName}`, 'ok');

        // Download the file
        try {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = this.currentFileName;
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 5000);
        } catch(e) {
            this.log(`Download error: ${e}`, 'err');
        }
        this.currentChunks = [];
    }

    onTransferDone() {
        document.getElementById('progress-label').innerText = 'COMPLETE';
        document.getElementById('progress-fill').style.background = 'var(--success)';
        this.toast('Transfer complete!', 'success');
        this.setStatus('online', 'COMPLETE');
        this.log('Transfer complete!', 'ok');
        if (this.isReceiver && this.vanishOnReceive) {
            this.toast('Session vanishing in 3s...', 'info');
            setTimeout(() => this.vanishSession(), 3000);
        } else { setTimeout(() => this.fullReset(), 2000); }
    }

    fullReset() {
        this.files = []; this.isSender = false; this.isReceiver = false;
        this.connected = false;
        this._encKey = null; this._encSalt = null; this._decKey = null;
        this.sessionKey = this.generateKey();
        if (this.conn) { try { this.conn.close(); } catch(e){} this.conn = null; }
        document.getElementById('file-list').innerHTML = '';
        document.getElementById('link-section').style.display = 'none';
        document.getElementById('progress-section').style.display = 'none';
        document.getElementById('progress-fill').style.width = '0%';
        document.getElementById('progress-fill').style.background = 'var(--fg)';
        document.getElementById('progress-label').innerText = 'TRANSFERRING...';
        document.querySelector('.card').className = 'card';
        this.setStatus('online', 'READY');
        this.toast('Ready for next transfer', 'info');
    }

    vanishSession() {
        this.log('VANISH: Cleaning session');
        if (this.conn) { try { this.conn.close(); } catch(e){} this.conn = null; }
        if (this.peer) { try { this.peer.destroy(); } catch(e){} this.peer = null; }
        this.files = [];
        this.fileResults = [];
        this.isSender = false;
        this.isReceiver = false;
        this.connected = false;
        this._encKey = null; this._encSalt = null; this._decKey = null;
        this.sessionKey = this.generateKey();
        window.history.replaceState({}, document.title, window.location.pathname);
        this.resetUI();
        this.toast('Session vanished', 'info');
        this.setStatus('connecting', 'REINITIALIZING...');
        setTimeout(() => this.connectToServer(0), 1000);
    }

    // ─── AES-256-GCM ────────────────────────────────────────────
    async deriveKey(pw, salt) {
        const enc = new TextEncoder();
        const km = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
        return crypto.subtle.deriveKey(
            { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
            km, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
        );
    }

    async encryptChunk(buffer) {
        if (!this._encSalt) {
            this._encSalt = crypto.getRandomValues(new Uint8Array(16));
            this._encKey = await this.deriveKey(this.sessionKey, this._encSalt);
        }
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, this._encKey, buffer);
        const out = new Uint8Array(16 + 12 + ct.byteLength);
        out.set(this._encSalt, 0);
        out.set(iv, 16);
        out.set(new Uint8Array(ct), 28);
        return out.buffer;
    }

    async decryptChunk(buffer) {
        const data = new Uint8Array(buffer);
        if (!this._decKey) {
            this._decKey = await this.deriveKey(this.sessionKey, data.slice(0, 16));
        }
        return crypto.subtle.decrypt({ name: 'AES-GCM', iv: data.slice(16, 28) }, this._decKey, data.slice(28));
    }

    // ─── Progress ────────────────────────────────────────────────
    showProgress() {
        document.getElementById('progress-section').style.display = 'block';
        const total = this.totalBytes || this.totalSize || 0;
        document.getElementById('stat-size').innerText = total > 0 ? this.formatSize(total) : '--';
    }

    updateProgress() {
        const total = this.totalBytes || this.totalSize || 0;
        const current = this.transferredBytes || this.receivedBytes || 0;
        if (!isFinite(total) || total <= 0 || !isFinite(current)) return;
        const pct = Math.min(Math.floor((current / total) * 100), 100);
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('progress-pct').innerText = pct + '%';
        const elapsed = (Date.now() - this.startTime) / 1000;
        if (elapsed > 0.1 && current > 0) {
            const spd = (current / (1024 * 1024)) / elapsed;
            if (isFinite(spd)) {
                this.speedSamples.push(spd);
                if (this.speedSamples.length > 10) this.speedSamples.shift();
                document.getElementById('stat-speed').innerText =
                    (this.speedSamples.reduce((a, b) => a + b, 0) / this.speedSamples.length).toFixed(1) + ' MB/s';
            }
            const rem = (total - current) / (current / elapsed);
            document.getElementById('stat-eta').innerText = isFinite(rem) && rem > 0 ? this.formatTime(rem) : '--';
        }
    }

    // ─── History ─────────────────────────────────────────────────
    addToHistory(name, size, status) {
        this.history.unshift({ name, size, status, time: Date.now() });
        if (this.history.length > 20) this.history.pop();
        this.renderHistory();
    }

    renderHistory() {
        const s = document.getElementById('history-section'), l = document.getElementById('history-list');
        if (!this.history.length) { s.style.display = 'none'; return; }
        s.style.display = 'block'; l.innerHTML = '';
        this.history.forEach(h => {
            const d = document.createElement('div');
            d.className = 'history-item';
            d.innerHTML = `<span class="history-name">${this.escapeHtml(h.name)}</span><span class="history-size">${this.formatSize(h.size)}</span><span class="history-status ${h.status}">&#10003;</span>`;
            l.appendChild(d);
        });
    }

    toggleHistory() {
        const s = document.getElementById('history-section');
        s.style.display = s.style.display === 'none' ? 'block' : 'none';
    }

    // ─── UI ──────────────────────────────────────────────────────
    setStatus(state, text) {
        const dot = document.getElementById('status-dot');
        dot.className = 'status-dot' + (state === 'online' ? ' online' : state === 'connecting' ? ' connecting' : '');
        document.getElementById('status-text').innerText = text;
        const bars = document.querySelectorAll('.signal-bar');
        const quality = state === 'online' ? 4 : state === 'connecting' ? 2 : 0;
        bars.forEach((bar, i) => bar.classList.toggle('active', i < quality));
    }

    updateAction(text, disabled) {
        const btn = document.getElementById('action-btn');
        btn.innerText = text;
        btn.disabled = disabled;
        if (!disabled) btn.onclick = () => this.selectFiles();
    }

    setupDropZone() {
        const zone = document.getElementById('drop-zone');
        const input = document.getElementById('file-input');
        ['dragenter', 'dragover'].forEach(e => zone.addEventListener(e, ev => { ev.preventDefault(); zone.classList.add('dragover'); }));
        ['dragleave', 'drop'].forEach(e => zone.addEventListener(e, ev => { ev.preventDefault(); zone.classList.remove('dragover'); }));
        zone.addEventListener('drop', ev => { if (ev.dataTransfer.files.length) this.handleFiles(ev.dataTransfer.files); });
        input.addEventListener('change', e => { if (e.target.files.length) this.handleFiles(e.target.files); });
    }

    resetUI() {
        this.files = []; this.isSender = false;
        this._encKey = null; this._encSalt = null; this._decKey = null;
        this.sessionKey = this.generateKey();
        document.getElementById('drop-zone').style.display = 'block';
        document.getElementById('file-list').innerHTML = '';
        document.getElementById('link-section').style.display = 'none';
        document.getElementById('progress-section').style.display = 'none';
        document.getElementById('progress-fill').style.width = '0%';
        document.getElementById('progress-fill').style.background = 'var(--fg)';
        document.getElementById('progress-label').innerText = 'TRANSFERRING...';
        document.querySelector('.card').className = 'card';
    }

    copyLink() {
        const box = document.getElementById('link-box');
        const url = box.innerText;
        navigator.clipboard.writeText(url).then(() => {
            this.toast('Link copied!', 'success');
            box.innerText = 'COPIED';
            setTimeout(() => { box.innerText = url; }, 1500);
        }).catch(() => this.toast('Copy failed', 'error'));
    }

    toggleTheme() {
        const html = document.documentElement;
        html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    toast(msg, type = 'info') {
        const container = document.getElementById('toast-container');
        const el = document.createElement('div');
        el.className = `toast ${type}`;
        el.innerText = msg;
        container.appendChild(el);
        setTimeout(() => { el.style.animation = 'toastOut 0.3s ease forwards'; setTimeout(() => el.remove(), 300); }, 3000);
    }

    // ─── Utilities ───────────────────────────────────────────────
    formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
    }

    formatTime(seconds) {
        if (seconds < 60) return Math.ceil(seconds) + 's';
        if (seconds < 3600) return Math.floor(seconds / 60) + 'm ' + Math.floor(seconds % 60) + 's';
        return Math.floor(seconds / 3600) + 'h ' + Math.floor((seconds % 3600) / 60) + 'm';
    }

    getFileEmoji(name) {
        const ext = name.split('.').pop().toLowerCase();
        const map = {
            pdf: '\uD83D\uDCC4', doc: '\uD83D\uDCDD', docx: '\uD83D\uDCDD', txt: '\uD83D\uDCC3',
            jpg: '\uD83D\uDDBC', jpeg: '\uD83D\uDDBC', png: '\uD83D\uDDBC', gif: '\uD83D\uDDBC', svg: '\uD83D\uDDBC', webp: '\uD83D\uDDBC',
            mp3: '\uD83C\uDFB5', wav: '\uD83C\uDFB5', flac: '\uD83C\uDFB5',
            mp4: '\uD83C\uDFAC', avi: '\uD83C\uDFAC', mkv: '\uD83C\uDFAC', mov: '\uD83C\uDFAC',
            zip: '\uD83D\uDCE6', rar: '\uD83D\uDCE6', '7z': '\uD83D\uDCE6',
            js: '\u2699', ts: '\u2699', py: '\u2699', html: '\u2699', css: '\u2699',
            xls: '\uD83D\uDCCA', xlsx: '\uD83D\uDCCA', csv: '\uD83D\uDCCA',
        };
        return map[ext] || '\uD83D\uDCC4';
    }

    escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
}

const app = new BeamApp();

(function() {
    var c = document.getElementById('shader-canvas');
    if (!c) return;
    var gl = c.getContext('webgl');
    if (!gl) return;
    var vs = gl.createShader(gl.VERTEX_SHADER);
    gl.shaderSource(vs, 'attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}');
    gl.compileShader(vs);
    var fs = gl.createShader(gl.FRAGMENT_SHADER);
    gl.shaderSource(fs, 'precision mediump float;uniform vec2 r;uniform float t;uniform vec2 m;vec3 pal(float t){vec3 a=vec3(.5),b=vec3(.5),c=vec3(1),d=vec3(.263,.416,.557);return a+b*cos(6.28318*(c*t+d));}void main(){vec2 uv=gl_FragCoord.xy/r,uv0=uv;uv=uv*2.-1.;uv.x*=r.x/r.y;float d=length(uv);vec3 col=vec3(0);for(float i=0.;i<4.;i++){uv=fract(uv*1.5)-.5;d=length(uv)*exp(-length(uv0));vec3 co=pal(length(uv0)+i*.4+t*.01);d=sin(d*4.+t)/36.;d=pow(.005/d,1.5);vec2 me=m-uv0;d*=1.+sin(length(me)*10.-t*2.)*.1;col+=co*d;}col+=vec3(sin(uv0.x*2.+t)*.01);vec3 g=mix(vec3(.1,.2,.5),vec3(.9,.1,.4),uv0.y+sin(t)*.2);col=mix(col,g,.3);gl_FragColor=vec4(col,1);}');
    gl.compileShader(fs);
    var p = gl.createProgram();
    gl.attachShader(p, vs); gl.attachShader(p, fs); gl.linkProgram(p);
    if (!gl.getProgramParameter(p, gl.LINK_STATUS)) return;
    var buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
    var aP = gl.getAttribLocation(p, 'p');
    var uR = gl.getUniformLocation(p, 'r');
    var uT = gl.getUniformLocation(p, 't');
    var uM = gl.getUniformLocation(p, 'm');
    var mx = .5, my = .5;
    window.addEventListener('mousemove', function(e) { mx = e.clientX / innerWidth; my = 1 - e.clientY / innerHeight; });
    function resize() { c.width = innerWidth; c.height = innerHeight; gl.viewport(0, 0, c.width, c.height); }
    resize(); window.addEventListener('resize', resize);
    var t0 = Date.now();
    (function frame() {
        var t = (Date.now() - t0) * .001;
        gl.clearColor(0, 0, 0, 1); gl.clear(gl.COLOR_BUFFER_BIT);
        gl.useProgram(p); gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.enableVertexAttribArray(aP); gl.vertexAttribPointer(aP, 2, gl.FLOAT, false, 0, 0);
        gl.uniform2f(uR, c.width, c.height); gl.uniform1f(uT, t); gl.uniform2f(uM, mx, my);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        requestAnimationFrame(frame);
    })();
})();
