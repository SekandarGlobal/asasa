<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIQUID P2P | STEALTH</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #000; --fg: #fff; --border: #222; }
        * { box-sizing: border-box; font-family: 'SF Mono', monospace; cursor: crosshair; }
        body { background: var(--bg); color: var(--fg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        .vault-card { 
            border: 1px solid var(--border); padding: 40px; width: 100%; max-width: 450px;
            background: #050505; position: relative;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .logo { font-weight: 900; letter-spacing: -2px; font-size: 22px; }
        .status-light { font-size: 9px; color: #555; text-transform: uppercase; }

        /* QR Section */
        #link-section { margin-top: 20px; display: none; text-align: center; }
        #qrcode { background: white; padding: 20px; border-radius: 2px; margin: 0 auto 20px; width: 220px; height: 220px; display: flex; justify-content: center; align-items: center; }
        #qrcode img { width: 180px !important; height: 180px !important; }
        .url-box { background: #111; border: 1px solid var(--border); padding: 12px; font-size: 10px; color: #666; word-break: break-all; cursor: pointer; }

        /* File UI */
        .file-zone { border: 1px dashed #333; padding: 40px 20px; margin-bottom: 20px; text-align: center; }
        .file-zone:hover { border-color: #fff; background: #0a0a0a; }
        .meta { font-size: 11px; text-align: left; display: none; border-top: 1px solid #222; padding-top: 10px; margin-top: 15px; }

        /* Vitals */
        .vitals { margin-top: 20px; display: none; }
        .v-row { display: flex; justify-content: space-between; font-size: 10px; color: #888; margin-bottom: 8px; }
        .bar-track { height: 1px; background: #111; width: 100%; }
        .bar-fill { height: 1px; background: #fff; width: 0%; box-shadow: 0 0 10px #fff; transition: width 0.1s; }

        .btn { background: #fff; color: #000; padding: 18px; width: 100%; border: none; font-weight: 900; font-size: 12px; letter-spacing: 2px; cursor: pointer; }
        .btn:disabled { background: #111; color: #333; }
        
        .shredding { animation: shred 0.5s forwards; }
        @keyframes shred { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(0.95) translateY(20px); filter: blur(10px); } }
    </style>
</head>
<body>

<div class="vault-card" id="card">
    <div class="header">
        <div class="logo">STEALTH.P2P</div>
        <div class="status-light" id="status">INITIATING...</div>
    </div>

    <div class="file-zone" id="drop-zone">
        <input type="file" id="file-input" style="display:none">
        <div id="prompt">SECURE CHANNEL READY: SELECT FILE</div>
        <div class="meta" id="meta-ui">
            <div>FILE: <b id="m-name"></b></div>
            <div>SIZE: <b id="m-size"></b></div>
        </div>
    </div>

    <button class="btn" id="main-btn" onclick="document.getElementById('file-input').click()">START BEAM</button>

    <div id="link-section">
        <div id="qrcode"></div>
        <div class="url-box" id="url-box" onclick="copyUrl()">GENERATING ENCRYPTED LINK...</div>
    </div>

    <div class="vitals" id="vitals-ui">
        <div class="v-row"><span id="v-speed">0.00 MB/S</span><span id="v-pct">0%</span></div>
        <div class="bar-track"><div class="bar-fill" id="bar-fill"></div></div>
    </div>
</div>

<script>
    const peer = new Peer();
    let activeConn;
    let startTime;
    let selectedFile;

    const status = document.getElementById('status');
    const mainBtn = document.getElementById('main-btn');

    peer.on('open', (id) => {
        status.innerText = "NODE: " + id.substring(0,8);
        const receiverId = new URLSearchParams(window.location.search).get('p');
        if (receiverId) connectToSender(receiverId);
    });

    // SENDER LOGIC
    document.getElementById('file-input').onchange = (e) => {
        selectedFile = e.target.files[0];
        if (!selectedFile) return;

        document.getElementById('prompt').style.display = 'none';
        document.getElementById('meta-ui').style.display = 'block';
        document.getElementById('m-name').innerText = selectedFile.name;
        document.getElementById('m-size').innerText = (selectedFile.size / 1048576).toFixed(2) + " MB";

        const shareUrl = `${window.location.origin}${window.location.pathname}?p=${peer.id}`;
        document.getElementById('link-section').style.display = 'block';
        document.getElementById('url-box').innerText = shareUrl;
        
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById('qrcode'), { text: shareUrl, width: 180, height: 180 });

        mainBtn.innerText = "WAITING FOR SCAN...";
        mainBtn.disabled = true;

        peer.on('connection', (conn) => {
            activeConn = conn;
            status.innerText = "PEER SYNCED";
            
            // Wait for Receiver to say "I AM READY"
            activeConn.on('data', (data) => {
                if (data.type === 'ready') {
                    status.innerText = "BEAMING...";
                    activeConn.send({ type: 'meta', name: selectedFile.name, size: selectedFile.size });
                    streamFile(selectedFile);
                }
                if (data.type === 'done') finalize();
            });
        });
    };

    async function streamFile(file) {
        document.getElementById('vitals-ui').style.display = 'block';
        startTime = Date.now();
        const chunkSize = 128 * 1024; // 128KB
        let offset = 0;

        while (offset < file.size) {
            const chunk = await file.slice(offset, offset + chunkSize).arrayBuffer();
            activeConn.send({ type: 'chunk', data: chunk });
            offset += chunk.byteLength;
            updateVitals(offset, file.size);
        }
        activeConn.send({ type: 'complete' });
    }

    // RECEIVER LOGIC
    function connectToSender(targetId) {
        mainBtn.disabled = true;
        mainBtn.innerText = "LINKING...";
        
        activeConn = peer.connect(targetId);

        let receivedSize = 0;
        let totalSize = 0;
        let name = "";
        let chunks = [];

        activeConn.on('open', () => {
            // CRITICAL: Tell the sender we are ready to receive
            activeConn.send({ type: 'ready' });
            status.innerText = "HANDSHAKE OK";
        });

        activeConn.on('data', (data) => {
            if (data.type === 'meta') {
                totalSize = data.size; name = data.name;
                document.getElementById('vitals-ui').style.display = 'block';
                document.getElementById('meta-ui').style.display = 'block';
                document.getElementById('m-name').innerText = name;
                document.getElementById('m-size').innerText = (totalSize / 1048576).toFixed(2) + " MB";
                document.getElementById('prompt').style.display = 'none';
                startTime = Date.now();
            }
            if (data.type === 'chunk') {
                chunks.push(data.data);
                receivedSize += data.data.byteLength;
                updateVitals(receivedSize, totalSize);
            }
            if (data.type === 'complete') {
                const blob = new Blob(chunks);
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = name; a.click();
                activeConn.send({ type: 'done' });
                finalize();
            }
        });
    }

    function updateVitals(cur, tot) {
        const pct = Math.floor((cur / tot) * 100);
        document.getElementById('bar-fill').style.width = pct + "%";
        document.getElementById('v-pct').innerText = pct + "%";
        const speed = (cur / 1048576) / ((Date.now() - startTime) / 1000);
        document.getElementById('v-speed').innerText = speed.toFixed(2) + " MB/S";
    }

    function finalize() {
        status.innerText = "SHREDDING SESSION...";
        document.getElementById('card').classList.add('shredding');
        setTimeout(() => {
            window.location.href = window.location.origin + window.location.pathname;
        }, 1500);
    }

    function copyUrl() {
        navigator.clipboard.writeText(document.getElementById('url-box').innerText);
        document.getElementById('url-box').innerText = "COPIED";
    }
</script>
</body>
</html>
