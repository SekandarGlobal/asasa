<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEALTH | VANISH</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #000; --fg: #fff; --border: #222; }
        * { box-sizing: border-box; font-family: 'SF Mono', monospace; cursor: crosshair; }
        body { background: var(--bg); color: var(--fg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        .vault-container { 
            border: 1px solid var(--border); padding: 40px; width: 95%; max-width: 450px; 
            background: #050505; position: relative; transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* The Vanish Animation */
        .vanish-effect { 
            opacity: 0; filter: blur(20px) brightness(2); transform: scale(0.9) translateY(-20px); 
            pointer-events: none; letter-spacing: 10px;
        }

        .header { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 10px; letter-spacing: 2px; }
        .log-stream { font-size: 8px; color: #444; height: 30px; overflow: hidden; text-transform: uppercase; margin-bottom: 20px; }
        
        #qrcode { background: white; padding: 15px; margin: 0 auto 20px; width: 230px; height: 230px; display: none; justify-content: center; align-items: center; border-radius: 2px; }
        #qrcode img { width: 200px !important; height: 200px !important; }

        .btn { background: #fff; color: #000; padding: 20px; width: 100%; border: none; font-weight: 900; cursor: pointer; letter-spacing: 4px; transition: 0.3s; }
        .btn:disabled { background: #111; color: #333; cursor: not-allowed; letter-spacing: 1px; }

        .vitals-box { margin-top: 30px; display: none; }
        .progress-meta { display: flex; justify-content: space-between; font-size: 9px; color: #888; margin-bottom: 8px; }
        .bar-track { height: 1px; background: #111; width: 100%; position: relative; }
        .bar-fill { height: 1px; background: #fff; width: 0%; box-shadow: 0 0 15px #fff; transition: width 0.1s; }

        #url-link { font-size: 9px; color: #444; margin-top: 20px; word-break: break-all; text-align: center; cursor: pointer; }
        #url-link:hover { color: #fff; }
    </style>
</head>
<body>

<div class="vault-container" id="main-ui">
    <div class="header">
        <b id="mode-tag">BEAM.VANISH</b>
        <span id="node-status">OFFLINE</span>
    </div>

    <div class="log-stream" id="log">AWAITING ENCRYPTED INPUT...</div>

    <div id="action-area">
        <input type="file" id="file-input" style="display:none">
        <button class="btn" id="main-btn" onclick="document.getElementById('file-input').click()">INITIALIZE</button>
        <div id="qrcode"></div>
        <div id="url-link" onclick="copyUrl()"></div>
    </div>

    <div class="vitals-box" id="vitals">
        <div class="progress-meta">
            <span id="v-speed">0.00 MB/S</span>
            <b id="v-pct">0%</b>
        </div>
        <div class="bar-track"><div class="bar-fill" id="fill"></div></div>
    </div>
</div>

<script>
    const peer = new Peer({
        config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }, { url: 'stun:stun1.l.google.com:19302' }]}
    });

    let conn, selectedFile, startTime;
    const ui = document.getElementById('main-ui');
    const logEl = document.getElementById('log');

    function updateLog(m) { logEl.innerText = m; }

    peer.on('open', (id) => {
        document.getElementById('node-status').innerText = "NODE:" + id.substring(0,6);
        const p = new URLSearchParams(window.location.search).get('p');
        if (p) runReceiver(p);
    });

    // SENDER
    document.getElementById('file-input').onchange = (e) => {
        selectedFile = e.target.files[0];
        if (!selectedFile) return;

        const url = window.location.origin + window.location.pathname + "?p=" + peer.id;
        document.getElementById('qrcode').style.display = 'flex';
        document.getElementById('url-link').innerText = url;
        new QRCode(document.getElementById('qrcode'), { text: url, width: 200, height: 200 });
        
        document.getElementById('main-btn').innerText = "PENDING SCAN...";
        document.getElementById('main-btn').disabled = true;
        updateLog("SOURCE ENCRYPTED. AWAITING PEER.");

        peer.on('connection', (c) => {
            conn = c;
            conn.on('open', () => {
                updateLog("PEER LINKED. INITIATING BEAM.");
                conn.send({ type: 'meta', name: selectedFile.name, size: selectedFile.size });
                beamData(selectedFile);
            });
            conn.on('data', (d) => { if(d.type === 'complete') triggerVanish("FILE DELIVERED"); });
        });
    };

    async function beamData(file) {
        document.getElementById('vitals').style.display = 'block';
        startTime = Date.now();
        const chunkSize = 128 * 1024;
        let offset = 0;

        while (offset < file.size) {
            const chunk = await file.slice(offset, offset + chunkSize).arrayBuffer();
            conn.send({ type: 'chunk', data: chunk });
            offset += chunk.byteLength;
            syncUI(offset, file.size);
        }
        conn.send({ type: 'done' });
    }

    // RECEIVER
    function runReceiver(pid) {
        updateLog("LINKING TO NODE...");
        document.getElementById('main-btn').innerText = "CONNECTING...";
        document.getElementById('main-btn').disabled = true;

        conn = peer.connect(pid, { reliable: true });
        let chunks = [], received = 0, total = 0, name = "";

        conn.on('data', (d) => {
            if (d.type === 'meta') {
                total = d.size; name = d.name;
                document.getElementById('vitals').style.display = 'block';
                document.getElementById('main-btn').style.display = 'none';
                startTime = Date.now();
                updateLog("RECEIVING: " + name);
            }
            if (d.type === 'chunk') {
                chunks.push(d.data);
                received += d.data.byteLength;
                syncUI(received, total);
            }
            if (d.type === 'done') {
                const blob = new Blob(chunks);
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob); a.download = name; a.click();
                conn.send({ type: 'complete' });
                triggerVanish("BEAM SUCCESSFUL");
            }
        });
    }

    function syncUI(cur, tot) {
        const pct = Math.floor((cur / tot) * 100);
        document.getElementById('fill').style.width = pct + "%";
        document.getElementById('v-pct').innerText = pct + "%";
        const speed = (cur / 1048576) / ((Date.now() - startTime) / 1000);
        document.getElementById('v-speed').innerText = speed.toFixed(2) + " MB/S";
    }

    function triggerVanish(msg) {
        updateLog(msg);
        setTimeout(() => {
            ui.classList.add('vanish-effect');
            // Hard reset after animation finishes
            setTimeout(() => {
                window.location.href = window.location.origin + window.location.pathname;
            }, 800);
        }, 1500);
    }

    function copyUrl() {
        navigator.clipboard.writeText(document.getElementById('url-link').innerText);
        updateLog("URL COPIED TO CLIPBOARD");
    }
</script>
</body>
</html>
