<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIQUID P2P | TITANIUM</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #000; --fg: #fff; --border: #222; }
        * { box-sizing: border-box; font-family: 'Inter', 'SF Mono', monospace; }
        body { 
            background: var(--bg); color: var(--fg); margin: 0;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .app-container { 
            width: 100%; max-width: 450px; padding: 40px; text-align: center;
            border: 1px solid var(--border); background: #050505;
        }
        .header { display: flex; justify-content: space-between; margin-bottom: 50px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .logo { font-weight: 900; letter-spacing: -1px; font-size: 20px; }
        .os-tag { font-size: 9px; color: #555; text-transform: uppercase; border: 1px solid #333; padding: 2px 6px; border-radius: 4px; }

        /* QR & Link Area */
        #qr-wrap { background: white; padding: 20px; border-radius: 4px; margin: 0 auto 30px; display: none; width: 240px; height: 240px; }
        #qr-wrap img { width: 200px !important; height: 200px !important; }
        .url-text { font-size: 10px; color: #666; word-break: break-all; margin-bottom: 30px; display: none; cursor: pointer; }

        /* File UI */
        .drop-zone { border: 1px dashed #333; padding: 50px 20px; margin-bottom: 30px; position: relative; }
        .drop-zone:hover { border-color: #fff; }
        .meta-grid { text-align: left; font-size: 11px; margin-top: 20px; display: none; border-top: 1px solid #222; padding-top: 15px; }
        .meta-item { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .label { color: #444; }

        /* Realtime Vitals */
        #vitals { margin-top: 30px; display: none; }
        .stat-row { display: flex; justify-content: space-between; font-size: 10px; color: #888; margin-bottom: 10px; }
        .progress-track { height: 1px; background: #111; position: relative; width: 100%; }
        .progress-fill { height: 1px; background: #fff; width: 0%; box-shadow: 0 0 15px #fff; transition: width 0.1s; }

        .btn { 
            background: #fff; color: #000; padding: 20px; width: 100%; 
            border: none; font-weight: 900; font-size: 13px; letter-spacing: 2px; cursor: pointer;
        }
        .btn:disabled { background: #111; color: #333; cursor: default; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .status-msg { font-size: 10px; color: #fff; letter-spacing: 2px; margin-bottom: 20px; animation: pulse 2s infinite; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="logo">BEAM // TITANIUM</div>
        <div class="os-tag" id="my-os">DETECTING...</div>
    </div>

    <div id="status-msg" class="status-msg">READY FOR SOURCE</div>

    <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input" style="display:none">
        <div id="prompt">TAP TO SELECT FILE</div>
        <div class="meta-grid" id="meta-grid">
            <div class="meta-item"><span class="label">FILE:</span><b id="m-name"></b></div>
            <div class="meta-item"><span class="label">SIZE:</span><b id="m-size"></b></div>
            <div class="meta-item"><span class="label">PEER:</span><b id="p-os">WAITING...</b></div>
        </div>
    </div>

    <div id="qr-wrap"></div>
    <div id="url-text" class="url-text" onclick="copyUrl()"></div>

    <div id="vitals">
        <div class="stat-row">
            <span id="v-speed">0.00 MB/s</span>
            <span id="v-pct">0%</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="fill"></div></div>
    </div>

    <button class="btn" id="action-btn" onclick="document.getElementById('file-input').click()">INITIALIZE</button>
</div>

<script>
    const peer = new Peer();
    let conn;
    let startTime;
    const myOS = navigator.platform.split(' ')[0];
    document.getElementById('my-os').innerText = "LOCAL: " + myOS;

    peer.on('open', (id) => {
        const pID = new URLSearchParams(window.location.search).get('p');
        if (pID) startReceiver(pID);
    });

    // SENDER LOGIC
    document.getElementById('file-input').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // UI Prep
        document.getElementById('prompt').style.display = 'none';
        document.getElementById('meta-grid').style.display = 'block';
        document.getElementById('m-name').innerText = file.name;
        document.getElementById('m-size').innerText = (file.size / 1048576).toFixed(2) + " MB";
        
        const url = `${window.location.origin}${window.location.pathname}?p=${peer.id}`;
        document.getElementById('qr-wrap').style.display = 'block';
        document.getElementById('url-text').style.display = 'block';
        document.getElementById('url-text').innerText = url;
        new QRCode(document.getElementById('qr-wrap'), { text: url, width: 200, height: 200 });

        document.getElementById('action-btn').innerText = "AWAITING PEER";
        document.getElementById('action-btn').disabled = true;

        peer.on('connection', (c) => {
            conn = c;
            conn.on('open', () => {
                document.getElementById('status-msg').innerText = "PEER LINKED / BEAMING";
                conn.send({ type: 'init', name: file.name, size: file.size, os: myOS });
                streamFile(file);
            });
            conn.on('data', (d) => {
                if(d.type === 'os') document.getElementById('p-os').innerText = d.os;
                if(d.type === 'complete') resetApp("TRANSMISSION SUCCESSFUL");
            });
        });
    };

    async function streamFile(file) {
        document.getElementById('vitals').style.display = 'block';
        startTime = Date.now();
        const chunkSize = 128 * 1024; // 128KB Chunks for Speed
        let offset = 0;

        while (offset < file.size) {
            const chunk = await file.slice(offset, offset + chunkSize).arrayBuffer();
            conn.send({ type: 'chunk', data: chunk });
            offset += chunk.byteLength;
            updateStats(offset, file.size);
        }
        conn.send({ type: 'done' });
    }

    // RECEIVER LOGIC
    function startReceiver(target) {
        document.getElementById('action-btn').innerText = "CONNECTING...";
        conn = peer.connect(target);
        
        let chunks = [];
        let received = 0;
        let total = 0;
        let name = "";

        conn.on('open', () => {
            conn.send({ type: 'os', os: myOS });
            document.getElementById('status-msg').innerText = "LINKED TO SOURCE";
        });

        conn.on('data', (d) => {
            if(d.type === 'init') {
                total = d.size; name = d.name;
                document.getElementById('p-os').innerText = d.os;
                document.getElementById('meta-grid').style.display = 'block';
                document.getElementById('m-name').innerText = name;
                document.getElementById('m-size').innerText = (total / 1048576).toFixed(2) + " MB";
                document.getElementById('vitals').style.display = 'block';
                document.getElementById('prompt').style.display = 'none';
                startTime = Date.now();
            }
            if(d.type === 'chunk') {
                chunks.push(d.data);
                received += d.data.byteLength;
                updateStats(received, total);
            }
            if(d.type === 'done') {
                const blob = new Blob(chunks);
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = name; a.click();
                conn.send({ type: 'complete' });
                resetApp("FILE RECEIVED");
            }
        });
    }

    function updateStats(cur, tot) {
        const pct = Math.floor((cur / tot) * 100);
        document.getElementById('fill').style.width = pct + "%";
        document.getElementById('v-pct').innerText = pct + "%";
        const speed = (cur / 1048576) / ((Date.now() - startTime) / 1000);
        document.getElementById('v-speed').innerText = speed.toFixed(2) + " MB/s";
    }

    function resetApp(msg) {
        setTimeout(() => {
            window.location.href = window.location.origin + window.location.pathname;
        }, 3000); // 3-second delay to show success
        document.getElementById('status-msg').innerText = msg;
        document.getElementById('fill').style.width = "100%";
    }

    function copyUrl() {
        navigator.clipboard.writeText(document.getElementById('url-text').innerText);
        document.getElementById('url-text').innerText = "COPIED TO CLIPBOARD";
    }
</script>
</body>
</html>
