<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEALTH | INDUSTRIAL</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #000; --fg: #fff; --border: #222; }
        * { box-sizing: border-box; font-family: 'SF Mono', monospace; }
        body { background: var(--bg); color: var(--fg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .vault { border: 1px solid var(--border); padding: 30px; width: 95%; max-width: 450px; background: #050505; }
        .header { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .log { font-size: 8px; color: #444; height: 40px; overflow-y: auto; text-transform: uppercase; margin-bottom: 10px; border-left: 1px solid #222; padding-left: 10px; }
        #qrcode { background: white; padding: 15px; margin: 20px auto; width: 230px; height: 230px; display: none; justify-content: center; align-items: center; }
        #qrcode img { width: 200px !important; height: 200px !important; }
        .btn { background: #fff; color: #000; padding: 20px; width: 100%; border: none; font-weight: 900; cursor: pointer; letter-spacing: 2px; }
        .btn:disabled { background: #111; color: #333; }
        .vitals { margin-top: 20px; display: none; }
        .bar { height: 1px; background: #111; width: 100%; margin-top: 10px; position: relative; }
        .fill { height: 1px; background: #fff; width: 0%; box-shadow: 0 0 10px #fff; transition: width 0.1s; }
        .meta-text { font-size: 10px; color: #666; margin-top: 10px; word-break: break-all; }
    </style>
</head>
<body>

<div class="vault" id="main-vault">
    <div class="header">
        <b>STEALTH.v3</b>
        <span id="node-id">OFFLINE</span>
    </div>
    
    <div class="log" id="console">SYSTEM READY...</div>

    <div id="setup-view">
        <input type="file" id="file-input" style="display:none">
        <button class="btn" id="init-btn" onclick="document.getElementById('file-input').click()">SELECT SOURCE</button>
        <div id="qrcode"></div>
        <div id="url-display" class="meta-text" style="text-align:center; cursor:pointer;" onclick="copyUrl()"></div>
    </div>

    <div class="vitals" id="vitals">
        <div style="display:flex; justify-content: space-between; font-size: 10px;">
            <span id="v-speed">0 MB/S</span>
            <span id="v-pct">0%</span>
        </div>
        <div class="bar"><div class="fill" id="fill"></div></div>
        <div class="meta-text" id="m-name">FILE: --</div>
    </div>
</div>

<script>
    // Industrial STUN config to bypass firewalls (Google's Public Servers)
    const peerConfig = {
        config: {
            'iceServers': [
                { url: 'stun:stun.l.google.com:19302' },
                { url: 'stun:stun1.l.google.com:19302' }
            ]
        }
    };

    const peer = new Peer(peerConfig);
    let conn;
    let selectedFile;
    let startTime;

    function log(msg) {
        const c = document.getElementById('console');
        c.innerHTML = msg + "<br>" + c.innerHTML;
    }

    peer.on('open', (id) => {
        document.getElementById('node-id').innerText = "ID: " + id.substring(0,6);
        log("NODE ACTIVE: " + id);
        
        const params = new URLSearchParams(window.location.search);
        if (params.get('p')) startReceiver(params.get('p'));
    });

    peer.on('error', (err) => log("PEER ERROR: " + err.type));

    // SENDER
    document.getElementById('file-input').onchange = (e) => {
        selectedFile = e.target.files[0];
        if (!selectedFile) return;

        const url = window.location.origin + window.location.pathname + "?p=" + peer.id;
        document.getElementById('qrcode').style.display = 'flex';
        document.getElementById('url-display').innerText = url;
        new QRCode(document.getElementById('qrcode'), { text: url, width: 200, height: 200 });
        
        document.getElementById('init-btn').innerText = "AWAITING PEER...";
        document.getElementById('init-btn').disabled = true;
        log("SENDER MODE: READY FOR SCAN");

        peer.on('connection', (c) => {
            conn = c;
            log("PEER CONNECTED");
            conn.on('open', () => {
                log("HANDSHAKE COMPLETE. BEAMING...");
                conn.send({ type: 'meta', name: selectedFile.name, size: selectedFile.size });
                streamFile(selectedFile);
            });
        });
    };

    async function streamFile(file) {
        document.getElementById('vitals').style.display = 'block';
        document.getElementById('m-name').innerText = "BEAMING: " + file.name;
        startTime = Date.now();
        const chunkSize = 64 * 1024;
        let offset = 0;

        while (offset < file.size) {
            const chunk = await file.slice(offset, offset + chunkSize).arrayBuffer();
            conn.send({ type: 'chunk', data: chunk });
            offset += chunk.byteLength;
            updateUI(offset, file.size);
        }
        conn.send({ type: 'done' });
        log("UPLOAD FINISHED");
    }

    // RECEIVER
    function startReceiver(pid) {
        log("RECEIVER MODE: LINKING TO " + pid);
        document.getElementById('init-btn').innerText = "CONNECTING...";
        document.getElementById('init-btn').disabled = true;

        conn = peer.connect(pid, { reliable: true });

        let chunks = [];
        let received = 0;
        let total = 0;
        let name = "";

        conn.on('open', () => log("LINK ESTABLISHED"));
        conn.on('data', (d) => {
            if (d.type === 'meta') {
                total = d.size; name = d.name;
                document.getElementById('vitals').style.display = 'block';
                document.getElementById('m-name').innerText = "RECEIVING: " + name;
                startTime = Date.now();
            }
            if (d.type === 'chunk') {
                chunks.push(d.data);
                received += d.data.byteLength;
                updateUI(received, total);
            }
            if (d.type === 'done') {
                const blob = new Blob(chunks);
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = name; a.click();
                log("DOWNLOAD COMPLETE");
                setTimeout(() => window.location.href = window.location.origin + window.location.pathname, 2000);
            }
        });
    }

    function updateUI(cur, tot) {
        const pct = Math.floor((cur / tot) * 100);
        document.getElementById('fill').style.width = pct + "%";
        document.getElementById('v-pct').innerText = pct + "%";
        const speed = (cur / 1048576) / ((Date.now() - startTime) / 1000);
        document.getElementById('v-speed').innerText = speed.toFixed(2) + " MB/S";
    }

    function copyUrl() {
        navigator.clipboard.writeText(document.getElementById('url-display').innerText);
        log("URL COPIED");
    }
</script>
</body>
</html>
