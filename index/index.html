<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid P2P | Instant Beam</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --accent: #00d4ff; --bg: #0a0a0c; --glass: rgba(255, 255, 255, 0.05); }
        body { 
            background: radial-gradient(circle at top, #161625, var(--bg)); 
            color: white; font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }
        .vault-card { 
            background: var(--glass); backdrop-filter: blur(30px); 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 35px;
            padding: 40px; width: 90%; max-width: 420px; text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
        }
        h1 { font-weight: 200; letter-spacing: 5px; margin-bottom: 5px; font-size: 22px; color: var(--accent); }
        .status-bar { font-size: 10px; opacity: 0.5; text-transform: uppercase; margin-bottom: 25px; letter-spacing: 1px; }
        .btn { 
            background: white; color: black; padding: 18px; border-radius: 18px; 
            font-weight: bold; cursor: pointer; border: none; width: 100%; transition: 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); }
        #link-display { 
            margin-top: 20px; background: rgba(0,0,0,0.3); padding: 12px; 
            border-radius: 12px; font-size: 11px; color: var(--accent);
            word-break: break-all; border: 1px solid rgba(0,212,255,0.1); cursor: pointer;
        }
        #qrcode { 
            background: white; padding: 15px; border-radius: 15px; 
            margin: 20px auto; display: none; width: 128px; height: 128px;
        }
        .progress-container { width: 100%; background: rgba(255,255,255,0.1); height: 4px; border-radius: 10px; margin-top: 20px; display: none; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: 0.2s; }
    </style>
</head>
<body>

<div class="vault-card">
    <h1>LIQUID P2P</h1>
    <div class="status-bar" id="status">System Standby</div>
    
    <div id="setup-ui">
        <input type="file" id="file-input" style="display:none">
        <button class="btn" id="main-btn" onclick="document.getElementById('file-input').click()">SELECT FILE TO BEAM</button>
        
        <div id="qrcode"></div>
        <div id="link-display" onclick="copyLink()"></div>
    </div>

    <div class="progress-container" id="p-container">
        <div id="progress-bar"></div>
    </div>
</div>

<script>
    const peer = new Peer(); 
    const status = document.getElementById('status');
    const linkDisplay = document.getElementById('link-display');
    const qrcodeDiv = document.getElementById('qrcode');
    const mainBtn = document.getElementById('main-btn');

    peer.on('open', (id) => {
        status.innerText = "Secure Node Active";
        
        // Logic for the RECEIVER
        const urlParams = new URLSearchParams(window.location.search);
        const senderId = urlParams.get('p');
        if (senderId) {
            connectToSender(senderId);
        }
    });

    // Logic for the SENDER
    document.getElementById('file-input').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const shareUrl = `${window.location.origin}${window.location.pathname}?p=${peer.id}`;
        
        // Show Link & QR Code
        linkDisplay.innerText = shareUrl;
        linkDisplay.style.display = "block";
        qrcodeDiv.style.display = "block";
        qrcodeDiv.innerHTML = "";
        new QRCode(qrcodeDiv, { text: shareUrl, width: 128, height: 128 });
        
        mainBtn.innerText = "WAITING FOR BEAM...";
        mainBtn.disabled = true;
        status.innerText = "Awaiting Receiver Connection";

        peer.on('connection', (conn) => {
            status.innerText = "Receiver Connected";
            conn.on('open', () => {
                status.innerText = "Streaming Data...";
                conn.send({
                    file: file,
                    name: file.name,
                    type: file.type
                });
            });
        });
    };

    function connectToSender(senderId) {
        mainBtn.innerText = "CONNECTING...";
        mainBtn.disabled = true;
        status.innerText = "Syncing with Node...";

        const conn = peer.connect(senderId);

        conn.on('data', (data) => {
            status.innerText = "Downloading...";
            document.getElementById('p-container').style.display = "block";
            document.getElementById('progress-bar').style.width = "100%";

            const blob = new Blob([data.file], { type: data.type });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = data.name;
            a.click();
            
            status.innerText = "Transmission Complete";
            mainBtn.innerText = "FILE RECEIVED";
        });
    }

    function copyLink() {
        navigator.clipboard.writeText(linkDisplay.innerText);
        alert("Link copied to clipboard!");
    }
</script>

</body>
</html>
